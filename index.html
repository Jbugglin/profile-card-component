<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <!--Link to external font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
    <!--Link to my stylesheet -->
    <link rel="stylesheet" href="./style.css">
    <title>Frontend Mentor | Profile card component</title>
</head>

<body>
    <div class="background-container">
        <img src="./images/bg-pattern-top.svg" alt="bg-pattern-top" id="bg-pattern-top">
        <img src="./images/bg-pattern-bottom.svg" alt="bg-pattern-bottom" id="bg-pattern-bottom">
    </div>
    <main>
        <img src="./images/bg-pattern-card.svg" alt="Card top pattern" id="card-top-pattern">
        <img src="./images/image-victor.jpg" alt="profile picture" id="user-profile-image">
        <div class="user-information">
            <h1 id="user-name">Victor Crest <span id="user-age">26</span></h1>

            <p id="user-location">London</p>
        </div>
        <hr>
        <div class="social-media-stats">
            <ul>
                <li>80K <span class="secondary-text-font">Followers</span></li>
                <li>803K <span class="secondary-text-font">Likes</span></li>
                <li>1.4K <span class="secondary-text-font">Photos</span></li>
            </ul>
        </div>
    </main>
    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. Coded by <a href="https://github.com/Jbugglin">Jordan Bugglin</a>.
    </footer>
</body>

</html>
